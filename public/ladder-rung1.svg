  <line x1="1020" y1="150" x2="1040" y2="72" stroke="#CFCFC6" stroke-width="10" stroke-linecap="round"/>
  <polyline points="1139,30 1155,10 1171,30" fill="none" stroke="#999990" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g><rect x="40" y="352" width="230" height="64" rx="10" fill="#e6e6e0" stroke="#c2c2b9" stroke-width="2"/><text x="56" y="393" font-family="Roboto, system-ui, sans-serif" font-size="26" font-weight="700" fill="#9a9a90">0</text><text x="88" y="393" font-family="Roboto, system-ui, sans-serif" font-size="20" fill="#9a9a90">cron</text>
