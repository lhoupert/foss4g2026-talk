name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [main]

# Least privilege: nothing at the workflow level; each job opts into only what it needs.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Slidev build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .slidev
            node_modules/.cache
          key: ${{ runner.os }}-slidev-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-slidev-

      - name: Build
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: npm run build -- --base "/$REPO_NAME/"

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      pages: write # publish the built site to GitHub Pages
      id-token: write # OIDC token for actions/deploy-pages attestation
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
